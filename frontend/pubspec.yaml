name: tsi_task_manager
description: The Studio Infinito — Task Manager
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^3.2.1
  
  # Routing
  go_router: ^17.1.0
  
  # HTTP Client
  dio: ^5.4.1
  
  # Storage
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.2.2
  
  # JSON Serialization
  json_annotation: ^4.8.1
  
  # Forms
  flutter_form_builder: ^10.3.0+2
  form_builder_validators: ^11.3.0
  
  # UI Components
  cupertino_icons: ^1.0.6
  intl: ^0.20.2
  
  # Charts
  fl_chart: ^1.1.1
  
  # File Handling
  file_picker: ^10.3.10
  permission_handler: ^12.0.1
  
  # Environment
  flutter_dotenv: ^6.0.0
  
  # Utils
  logger: ^2.0.2+1
  
  # WebSocket & Real-time
  socket_io_client: ^2.0.1
  web_socket_channel: ^3.0.3

  # WASM-compatible web APIs (replaces dart:html)
  web: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.8
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  
  assets:
    - .env
    - assets/images/
  
