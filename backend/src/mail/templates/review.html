<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Review</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      line-height: 1.6;
      color: #333;
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
    }
    .header {
      background-color: #9C27B0;
      color: white;
      padding: 20px;
      text-align: center;
      border-radius: 5px 5px 0 0;
    }
    .content {
      background-color: #f9f9f9;
      padding: 30px;
      border: 1px solid #ddd;
      border-top: none;
    }
    .task-details {
      background-color: white;
      padding: 15px;
      margin: 20px 0;
      border-left: 4px solid #9C27B0;
    }
    .status {
      display: inline-block;
      padding: 8px 16px;
      border-radius: 5px;
      font-weight: bold;
      margin: 10px 0;
    }
    .status-approved {
      background-color: #4CAF50;
      color: white;
    }
    .status-reopened {
      background-color: #ff9800;
      color: white;
    }
    .comment-box {
      background-color: #f5f5f5;
      padding: 15px;
      border-left: 3px solid #9C27B0;
      margin: 15px 0;
      font-style: italic;
    }
    .button {
      display: inline-block;
      padding: 12px 24px;
      background-color: #9C27B0;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      margin: 20px 0;
    }
    .footer {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Task Review</h1>
  </div>
  <div class="content">
    <p>Hi {{name}},</p>
    <p><strong>{{reviewer_name}}</strong> has reviewed your task.</p>
    
    <div class="task-details">
      <h2>{{task_title}}</h2>
      <p><strong>Review Status:</strong> <span class="status status-{{review_status}}">{{review_status}}</span></p>
      
      <div class="comment-box">
        <strong>Reviewer Comment:</strong><br>
        {{review_comment}}
      </div>
    </div>
    
    <a href="{{task_url}}" class="button">View Task</a>
    
    <p>Thank you for your work on this task!</p>
  </div>
  <div class="footer">
    <p>This is an automated email from Task Manager. Please do not reply.</p>
    <p><a href="{{app_url}}">Visit Task Manager</a></p>
  </div>
</body>
</html>
